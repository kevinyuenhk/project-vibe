<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Project Vibe</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
#loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; font-family: sans-serif; z-index: 100; }
#loading h1 { font-size: 2em; margin-bottom: 1em; }
#loading .bar { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
#loading .bar-fill { width: 0%; height: 100%; background: #4488ff; transition: width 0.3s; }
</style>
</head>
<body>
<div id="loading">
  <h1>⚔️ Project Vibe</h1>
  <div class="bar"><div class="bar-fill" id="progress"></div></div>
  <p style="margin-top:1em;color:#888">Loading dungeon...</p>
</div>
<script>
// Attempt to set COOP/COEP via Service Worker for SharedArrayBuffer support
if ('serviceWorker' in navigator) {
  const swContent = `
    self.addEventListener('install', () => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', event => {
      if (event.request.mode === 'navigate') {
        event.respondWith(
          fetch(event.request).then(response => {
            const headers = new Headers(response.headers);
            headers.set('Cross-Origin-Opener-Policy', 'same-origin');
            headers.set('Cross-Origin-Embedder-Policy', 'require-corp');
            return new Response(response.body, { status: response.status, statusText: response.statusText, headers });
          })
        );
      } else {
        event.respondWith(fetch(event.request));
      }
    });
  `;
  const blob = new Blob([swContent], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(() => {
    // Reload to apply headers
    if (!crossOriginIsolated) {
      window.location.reload();
    }
  }).catch(() => {
    console.warn('SW registration failed, SharedArrayBuffer may not work');
  });
}
</script>
$GODOT_SCRIPT
</body>
</html>
