<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Project Vibe</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
#loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; font-family: sans-serif; z-index: 100; }
#loading h1 { font-size: 2em; margin-bottom: 1em; }
#loading .bar { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
#loading .bar-fill { width: 0%; height: 100%; background: #4488ff; transition: width 0.3s; }
#loading p { margin-top: 1em; color: #888; }
</style>
</head>
<body>
<div id="loading">
  <h1>&#9876;&#65039; Project Vibe</h1>
  <div class="bar"><div class="bar-fill" id="progress"></div></div>
  <p id="status">Loading dungeon...</p>
</div>
<script src="index.js"></script>
<script>
(function () {
  var GODOT_CONFIG = {
    args: [],
    canvasResizePolicy: 2,
    executable: 'index',
    experimentalVK: false,
    fileSizes: { 'index.pck': 20328, 'index.wasm': 37013224 },
    focusCanvas: true,
    gdnativeLibs: [],
  };

  function startEngine() {
    var engine = new Engine(GODOT_CONFIG);
    engine.startGame({
      onProgress: function (current, total) {
        if (total > 0) {
          var el = document.getElementById('progress');
          if (el) el.style.width = Math.round((current / total) * 100) + '%';
        }
      },
    }).then(function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    }).catch(function (err) {
      var el = document.getElementById('status');
      if (el) el.textContent = 'Failed to load: ' + (err.message || err);
      console.error('Godot failed to start:', err);
    });
  }

  // Register the COI service worker so COOP/COEP headers are set on all
  // responses. This enables SharedArrayBuffer, which Godot needs for threads.
  // On the first visit the page reloads once after SW activation; subsequent
  // visits start the engine immediately.
  if (!crossOriginIsolated && 'serviceWorker' in navigator) {
    navigator.serviceWorker.register('./coi-serviceworker.js').then(function () {
      window.location.reload();
    }).catch(function (err) {
      console.warn('COI service worker registration failed:', err);
      // Try anyway – will likely fail only if SharedArrayBuffer is needed
      startEngine();
    });
  } else {
    startEngine();
  }
}());
</script>
</body>
</html>
